<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="styles.css">
    <link rel="shortcut icon" href="./images/tickeryeti_favicon.png"/>
    <title>TickerYeti</title>
  </head>

  <body>
    <div class="container">
      <nav class="navbar navbar-expand-md navbar-light fixed-top" style="background-color: #ffffff;">
        <div class="container-fluid">
          <a class="navbar-brand tickeryeti_brand" href="index.html"><img src="./images/tickeryeti_face_brand.png"> TickerYeti</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto">
              <li class="nav-item">
                <a class="nav-link" href="help.html">Help</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="mailto:chad@mountainstache.com?Subject=TickerYeti%20Contact">Contact</a>
              </li>
            </ul>
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <img class="navbar-brand" src="./images/mountainstache_brand.png">
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>
    <div class="container">
      <div class="row">
        <div class="col-lg-5">
          <div class="interface">
            <h4>Enter Stock Ticker Symbol</h4>
            <form id="ticker">
              <div class="mb-3">
                <input type="text" name="tickersymbol" id="tickersymbol" class="form-control" style="width: auto; display: inline-block;">
                <button type="submit" class="btn btn-secondary">Yeti</button>
              </div>
              <div class="mb-3">
                <div>
                  <input type="checkbox" name="yahoo_tickeryeti" id="yahoocheck_tickeryeti" checked>
                  <label for="yahoocheck_tickeryeti">Yahoo Finance</label>
                </div>
                <div>
                  <input type="checkbox" name="seekingalpha_tickeryeti" id="seekingalphacheck_tickeryeti" checked>
                  <label for="seekingalphacheck_tickeryeti">Seeking Alpha</label>
                </div>
                <div>
                  <input type="checkbox" name="sec_tickeryeti" id="seccheck_tickeryeti" checked>
                  <label for="seccheck_tickeryeti">Securities &amp; Exchange Commission</label>
                </div>
                <div>
                  <input type="checkbox" name="finviz_tickeryeti" id="finvizcheck_tickeryeti" checked>
                  <label for="finvizcheck_tickeryeti">Finviz</label>
                </div>
                <div>
                  <input type="checkbox" name="stanford_tickeryeti" id="stanfordcheck_tickeryeti">
                  <label for="stanfordcheck_tickeryeti"><a class="link_color" href="https://securities.stanford.edu/filings.html">Stanford Securities Class Action Search</a></label>
                </div>
              </div>
            </form>
          </div>
        </div>
        <div class="col-lg-7">
          <img src="./images/tickeryeti_800x600.png" class="img-fluid">
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmE6bVMFmVqO/qbeFqKmE1YcS/7" crossorigin="anonymous" defer></script>
    <script type="text/javascript" src="tickeryeti.js" defer></script>
  </body>
</html>
