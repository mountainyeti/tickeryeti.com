name: Deploy

on:
  push:
    branches:
      - master
      - qa

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to QA
        if: github.ref == 'refs/heads/qa'
        run: |
          aws s3 sync . s3://aws-website-qatickeryeticom-x4mxs \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "deploy.sh" \
            --exclude ".claude/*" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --exclude "lambda/*" \
            --delete
          aws cloudfront create-invalidation \
            --distribution-id E2UFPZDNVM17BF \
            --paths "/*" \
            --region us-east-1

      - name: Deploy to Production
        if: github.ref == 'refs/heads/master'
        run: |
          aws s3 sync . s3://aws-website-tickeryeticom-llnte \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "deploy.sh" \
            --exclude ".claude/*" \
            --exclude "README.md" \
            --exclude ".gitignore" \
            --exclude "lambda/*" \
            --delete
          aws cloudfront create-invalidation \
            --distribution-id EL9KYS40OVA5W \
            --paths "/*" \
            --region us-east-1
