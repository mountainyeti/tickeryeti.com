name: Test and Deploy

on:
  push:
    branches:
      - master
      - qa

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run API tests
        run: pytest tests/test_api.py -v

      - name: Run frontend tests
        run: pytest tests/test_frontend.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy Lambda
        run: |
          cd lambda
          zip -j function.zip function.py
          aws lambda update-function-code \
            --function-name tickeryeti-api \
            --zip-file fileb://function.zip \
            --region us-east-1 \
            --output text > /dev/null
          aws lambda wait function-updated \
            --function-name tickeryeti-api \
            --region us-east-1
          aws lambda update-function-configuration \
            --function-name tickeryeti-api \
            --environment "Variables={FMP_KEY=${{ secrets.FMP_KEY }},GITHUB_TOKEN=${{ secrets.FEEDBACK_GITHUB_PAT }}}" \
            --region us-east-1 \
            --output text > /dev/null

      - name: Deploy to QA
        if: github.ref == 'refs/heads/qa'
        run: |
          BUCKET="aws-website-qatickeryeticom-x4mxs"
          BASE=(
            --exclude '.git/*' --exclude '.github/*' --exclude 'deploy.sh'
            --exclude '.claude/*' --exclude 'README.md' --exclude '.gitignore'
            --exclude 'lambda/*' --exclude 'tests/*' --exclude 'requirements-test.txt'
          )
          # HTML: always revalidate
          aws s3 sync . "s3://$BUCKET" "${BASE[@]}" \
            --exclude '*.js' --exclude '*.css' --exclude 'images/*' \
            --cache-control 'no-cache' --delete
          # JS + CSS: 1-hour browser cache
          aws s3 sync . "s3://$BUCKET" "${BASE[@]}" \
            --exclude '*.html' --exclude 'images/*' \
            --cache-control 'public, max-age=3600' --delete
          # Images: 1-week browser cache
          aws s3 sync . "s3://$BUCKET" "${BASE[@]}" \
            --exclude '*.html' --exclude '*.js' --exclude '*.css' \
            --cache-control 'public, max-age=604800' --delete
          aws cloudfront create-invalidation \
            --distribution-id E2UFPZDNVM17BF --paths '/*' --region us-east-1

      - name: Deploy to Production
        if: github.ref == 'refs/heads/master'
        run: |
          BUCKET="aws-website-tickeryeticom-llnte"
          BASE=(
            --exclude '.git/*' --exclude '.github/*' --exclude 'deploy.sh'
            --exclude '.claude/*' --exclude 'README.md' --exclude '.gitignore'
            --exclude 'lambda/*' --exclude 'tests/*' --exclude 'requirements-test.txt'
          )
          # HTML: always revalidate
          aws s3 sync . "s3://$BUCKET" "${BASE[@]}" \
            --exclude '*.js' --exclude '*.css' --exclude 'images/*' \
            --cache-control 'no-cache' --delete
          # JS + CSS: 1-hour browser cache
          aws s3 sync . "s3://$BUCKET" "${BASE[@]}" \
            --exclude '*.html' --exclude 'images/*' \
            --cache-control 'public, max-age=3600' --delete
          # Images: 1-week browser cache
          aws s3 sync . "s3://$BUCKET" "${BASE[@]}" \
            --exclude '*.html' --exclude '*.js' --exclude '*.css' \
            --cache-control 'public, max-age=604800' --delete
          aws cloudfront create-invalidation \
            --distribution-id EL9KYS40OVA5W --paths '/*' --region us-east-1
